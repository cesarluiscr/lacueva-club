<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Tree Leaves -->
  <g id="tree">
    <!-- Left branch leaves -->
    <ellipse cx="60" cy="40" rx="8" ry="12" fill="white" transform="rotate(-35 60 40)" opacity="0.9"/>
    <ellipse cx="50" cy="50" rx="8" ry="12" fill="white" transform="rotate(-50 50 50)" opacity="0.85"/>
    <ellipse cx="55" cy="65" rx="8" ry="12" fill="white" transform="rotate(-30 55 65)" opacity="0.9"/>
    <ellipse cx="45" cy="75" rx="8" ry="12" fill="white" transform="rotate(-60 45 75)" opacity="0.85"/>
    <ellipse cx="50" cy="90" rx="8" ry="12" fill="white" transform="rotate(-25 50 90)" opacity="0.9"/>
    <ellipse cx="40" cy="100" rx="8" ry="12" fill="white" transform="rotate(-55 40 100)" opacity="0.85"/>
    <ellipse cx="48" cy="115" rx="8" ry="12" fill="white" transform="rotate(-35 48 115)" opacity="0.9"/>
    <ellipse cx="38" cy="125" rx="8" ry="12" fill="white" transform="rotate(-65 38 125)" opacity="0.85"/>

    <!-- Right branch leaves -->
    <ellipse cx="140" cy="40" rx="8" ry="12" fill="white" transform="rotate(35 140 40)" opacity="0.9"/>
    <ellipse cx="150" cy="50" rx="8" ry="12" fill="white" transform="rotate(50 150 50)" opacity="0.85"/>
    <ellipse cx="145" cy="65" rx="8" ry="12" fill="white" transform="rotate(30 145 65)" opacity="0.9"/>
    <ellipse cx="155" cy="75" rx="8" ry="12" fill="white" transform="rotate(60 155 75)" opacity="0.85"/>
    <ellipse cx="150" cy="90" rx="8" ry="12" fill="white" transform="rotate(25 150 90)" opacity="0.9"/>
    <ellipse cx="160" cy="100" rx="8" ry="12" fill="white" transform="rotate(55 160 100)" opacity="0.85"/>
    <ellipse cx="152" cy="115" rx="8" ry="12" fill="white" transform="rotate(35 152 115)" opacity="0.9"/>
    <ellipse cx="162" cy="125" rx="8" ry="12" fill="white" transform="rotate(65 162 125)" opacity="0.85"/>

    <!-- Center top leaves -->
    <ellipse cx="100" cy="35" rx="8" ry="12" fill="white" transform="rotate(0 100 35)" opacity="0.95"/>
    <ellipse cx="90" cy="45" rx="8" ry="12" fill="white" transform="rotate(-20 90 45)" opacity="0.9"/>
    <ellipse cx="110" cy="45" rx="8" ry="12" fill="white" transform="rotate(20 110 45)" opacity="0.9"/>
    <ellipse cx="85" cy="60" rx="8" ry="12" fill="white" transform="rotate(-40 85 60)" opacity="0.85"/>
    <ellipse cx="115" cy="60" rx="8" ry="12" fill="white" transform="rotate(40 115 60)" opacity="0.85"/>

    <!-- Middle section leaves -->
    <ellipse cx="70" cy="70" rx="7" ry="11" fill="white" transform="rotate(-45 70 70)" opacity="0.85"/>
    <ellipse cx="130" cy="70" rx="7" ry="11" fill="white" transform="rotate(45 130 70)" opacity="0.85"/>
    <ellipse cx="75" cy="85" rx="7" ry="11" fill="white" transform="rotate(-35 75 85)" opacity="0.9"/>
    <ellipse cx="125" cy="85" rx="7" ry="11" fill="white" transform="rotate(35 125 85)" opacity="0.9"/>
    <ellipse cx="80" cy="100" rx="7" ry="11" fill="white" transform="rotate(-30 80 100)" opacity="0.85"/>
    <ellipse cx="120" cy="100" rx="7" ry="11" fill="white" transform="rotate(30 120 100)" opacity="0.85"/>
    <ellipse cx="85" cy="115" rx="7" ry="11" fill="white" transform="rotate(-40 85 115)" opacity="0.9"/>
    <ellipse cx="115" cy="115" rx="7" ry="11" fill="white" transform="rotate(40 115 115)" opacity="0.9"/>

    <!-- Trunk -->
    <rect x="95" y="125" width="10" height="60" fill="white" rx="5"/>

    <!-- Trunk detail -->
    <rect x="96" y="130" width="2" height="50" fill="rgba(0,0,0,0.1)" rx="1"/>
    <rect x="102" y="130" width="2" height="50" fill="rgba(255,255,255,0.3)" rx="1"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="100" cy="190" r="3" fill="white" opacity="0.6"/>
  <circle cx="90" cy="185" r="2" fill="white" opacity="0.5"/>
  <circle cx="110" cy="185" r="2" fill="white" opacity="0.5"/>
</svg>